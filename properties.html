<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Postit Properties</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: '맑은 고딕', Malgun Gothic, sans-serif;
      font-size: 9pt;
      background: #f5f5f5;
      padding: 16px 20px;
      user-select: none;
    }

    .row {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }

    .row label {
      width: 72px;
      font-weight: bold;
      color: #444;
      flex-shrink: 0;
    }

    .row input, .row select {
      flex: 1;
      padding: 5px 8px;
      border: 1px solid #bbb;
      border-radius: 4px;
      font-family: inherit;
      font-size: 9pt;
    }

    .row input:focus, .row select:focus {
      outline: none;
      border-color: #5c9eff;
      box-shadow: 0 0 3px rgba(92, 158, 255, 0.4);
    }

    /* 우선순위 select 옵션별 색상 */
    select option[value="1"] { color: #e53935; }
    select option[value="2"] { color: #f9a825; }
    select option[value="3"] { color: #1e88e5; }
    select option[value="4"] { color: #43a047; }
    select option[value="5"] { color: #888888; }

    /* 알림 체크박스 */
    .alarm-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: 4px;
    }
    .alarm-wrap input[type="checkbox"] {
      flex: none;
      width: 14px;
      height: 14px;
    }
    .alarm-wrap span {
      font-size: 9pt;
      color: #555;
    }
    .alarm-wrap span.disabled { color: #bbb; }

    /* 요일 반복 선택 */
    .days-row {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }
    .days-row label {
      width: 72px;
      font-weight: bold;
      color: #444;
      flex-shrink: 0;
    }
    .days-wrap {
      display: flex;
      gap: 2px;
      flex: 1;
    }
    .day-btn {
      width: 32px;
      height: 26px;
      border: 1px solid #bbb;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 8.5pt;
      color: #555;
    }
    .day-btn:hover { background: #eef4ff; border-color: #88b; }
    .day-btn.selected {
      background: #4a8df8;
      color: #fff;
      border-color: #4a8df8;
      font-weight: bold;
    }

    /* 구분선 */
    hr {
      border: none;
      border-top: 1px solid #ddd;
      margin: 14px 0;
    }

    /* 색상 프리셋 */
    .color-presets {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      flex: 1;
    }

    .color-swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .color-swatch:hover { border-color: #888; }
    .color-swatch.selected { border-color: #333; box-shadow: 0 0 4px rgba(0,0,0,0.3); }

    .color-custom {
      width: 24px;
      height: 24px;
      border: 1px dashed #aaa;
      border-radius: 50%;
      cursor: pointer;
      padding: 0;
      background: linear-gradient(135deg, #f88, #8f8, #88f);
      position: relative;
      overflow: hidden;
    }
    .color-custom input[type="color"] {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0;
      cursor: pointer;
      border: none;
      padding: 0;
    }

    /* 버튼 영역 */
    .buttons {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }

    .buttons button {
      padding: 6px 18px;
      border: 1px solid #bbb;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 9pt;
    }

    .buttons button:hover { background: #eee; }

    #btnSave {
      background: #4a8df8;
      color: #fff;
      border-color: #4a8df8;
    }
    #btnSave:hover { background: #3a7de8; }

    #btnReset {
      margin-right: auto;
      color: #777;
      border-color: #ccc;
    }
    #btnReset:hover { background: #fee; color: #c33; border-color: #c33; }

    /* 라디오 버튼 */
    .radio-wrap {
      display: flex;
      gap: 14px;
      flex: 1;
    }
    .radio-label {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      font-weight: normal;
      width: auto;
    }
    .radio-label input[type="radio"] {
      flex: none;
      margin: 0;
    }

    /* 태그 셀렉트 박스 */
    .category-wrap {
      flex: 1;
      border: 1px solid #bbb;
      border-radius: 4px;
      background: #fff;
      max-height: 120px;
      overflow-y: auto;
      padding: 2px 0;
    }
    .category-wrap::-webkit-scrollbar { width: 6px; }
    .category-wrap::-webkit-scrollbar-track { background: transparent; }
    .category-wrap::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }

    .cat-group-header {
      padding: 4px 8px 2px;
      font-size: 8pt;
      font-weight: 700;
      color: #666;
      background: #f8f8f8;
      border-bottom: 1px solid #eee;
      user-select: none;
    }
    .cat-check-label {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px 3px 20px;
      cursor: pointer;
      white-space: nowrap;
    }
    .cat-check-label:hover { background: #f0f4ff; }
    .cat-check-label.no-group {
      padding-left: 8px;
    }
    .cat-check-label input[type="checkbox"] {
      flex: none;
      width: 13px; height: 13px;
    }
    .cat-badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 8pt;
      font-weight: 600;
    }
    .cat-empty {
      color: #999;
      font-size: 8.5pt;
      padding: 8px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="row">
    <label data-i18n="properties.date">Date</label>
    <input type="date" id="inputDate">
    <button type="button" id="btnToday" data-i18n="properties.today" style="margin-left:6px; padding:5px 10px; border:1px solid #bbb; border-radius:4px; background:#fff; cursor:pointer; font-family:inherit; font-size:9pt; white-space:nowrap;">Today</button>
  </div>

  <div class="row">
    <label data-i18n="properties.time">Time</label>
    <select id="selectHour">
      <option value="">--</option>
      <option value="00">00</option><option value="01">01</option>
      <option value="02">02</option><option value="03">03</option>
      <option value="04">04</option><option value="05">05</option>
      <option value="06">06</option><option value="07">07</option>
      <option value="08">08</option><option value="09">09</option>
      <option value="10">10</option><option value="11">11</option>
      <option value="12">12</option><option value="13">13</option>
      <option value="14">14</option><option value="15">15</option>
      <option value="16">16</option><option value="17">17</option>
      <option value="18">18</option><option value="19">19</option>
      <option value="20">20</option><option value="21">21</option>
      <option value="22">22</option><option value="23">23</option>
    </select>
    <span style="margin: 0 4px; font-weight: bold;">:</span>
    <select id="selectMin">
      <option value="">--</option>
      <option value="00">00</option>
      <option value="15">15</option>
      <option value="30">30</option>
      <option value="45">45</option>
    </select>
    <div class="alarm-wrap">
      <input type="checkbox" id="checkAlarm">
      <span id="alarmLabel" data-i18n="properties.alarm">Alarm</span>
    </div>
  </div>

  <div class="days-row">
    <label data-i18n="properties.repeat">Repeat</label>
    <div class="days-wrap">
      <button type="button" class="day-btn" data-day="1" data-i18n="day.1">Mon</button>
      <button type="button" class="day-btn" data-day="2" data-i18n="day.2">Tue</button>
      <button type="button" class="day-btn" data-day="3" data-i18n="day.3">Wed</button>
      <button type="button" class="day-btn" data-day="4" data-i18n="day.4">Thu</button>
      <button type="button" class="day-btn" data-day="5" data-i18n="day.5">Fri</button>
      <button type="button" class="day-btn" data-day="6" data-i18n="day.6">Sat</button>
      <button type="button" class="day-btn" data-day="0" data-i18n="day.0">Sun</button>
    </div>
  </div>

  <hr>

  <div class="row">
    <label data-i18n="properties.priority">Priority</label>
    <select id="selectPriority">
      <option value="1" data-i18n="priority.1">1. Urgent</option>
      <option value="2" data-i18n="priority.2">2. High</option>
      <option value="3" selected data-i18n="priority.3">3. Normal</option>
      <option value="4" data-i18n="priority.4">4. Low</option>
      <option value="5" data-i18n="priority.5">5. Occasional</option>
    </select>
  </div>

  <div class="row">
    <label data-i18n="properties.color">Color</label>
    <div class="color-presets" id="colorPresets">
      <div class="color-swatch selected" data-color="#ffff99" style="background:#ffff99;" data-i18n-title="color.yellow" title="Yellow"></div>
      <div class="color-swatch" data-color="#ffcccc" style="background:#ffcccc;" data-i18n-title="color.pink" title="Pink"></div>
      <div class="color-swatch" data-color="#ccddff" style="background:#ccddff;" data-i18n-title="color.blue" title="Blue"></div>
      <div class="color-swatch" data-color="#ccffcc" style="background:#ccffcc;" data-i18n-title="color.green" title="Green"></div>
      <div class="color-swatch" data-color="#e0ccff" style="background:#e0ccff;" data-i18n-title="color.purple" title="Purple"></div>
      <div class="color-swatch" data-color="#ffe0b2" style="background:#ffe0b2;" data-i18n-title="color.orange" title="Orange"></div>
      <div class="color-swatch" data-color="#ccffff" style="background:#ccffff;" data-i18n-title="color.sky" title="Sky Blue"></div>
      <div class="color-swatch" data-color="#e0e0e0" style="background:#e0e0e0;" data-i18n-title="color.gray" title="Gray"></div>
      <div class="color-custom" data-i18n-title="properties.customColor" title="Custom">
        <input type="color" id="inputColorCustom" value="#ffff99">
      </div>
    </div>
  </div>

  <hr>

  <div class="row">
    <label data-i18n="properties.editMode">Edit Mode</label>
    <div class="radio-wrap">
      <label class="radio-label">
        <input type="radio" name="editMode" value="html" checked>
        <span data-i18n="properties.modeHtml">HTML (WYSIWYG)</span>
      </label>
      <label class="radio-label">
        <input type="radio" name="editMode" value="wiki">
        <span data-i18n="properties.modeWiki">Wiki (Markdown)</span>
      </label>
    </div>
  </div>

  <hr>

  <div class="row" style="align-items:flex-start;">
    <label data-i18n="properties.categories" style="padding-top:2px;">Categories</label>
    <div id="categoryWrap" class="category-wrap"></div>
  </div>

  <div class="buttons">
    <button id="btnReset" data-i18n="properties.reset">Reset</button>
    <button id="btnCancel" data-i18n="properties.cancel">Cancel</button>
    <button id="btnSave" data-i18n="properties.save">Save</button>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    // ── i18n ─────────────────────────────────────────────
    let _translations = {};
    function t(key, params) {
      let str = _translations[key] || key;
      if (params) Object.entries(params).forEach(([k,v]) => { str = str.replace(`{${k}}`, v); });
      return str;
    }
    function applyTranslations() {
      document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
      document.querySelectorAll('[data-i18n-title]').forEach(el => { el.title = t(el.dataset.i18nTitle); });
    }
    ipcRenderer.on('set-translations', (_e, tr) => { _translations = tr; applyTranslations(); });

    const inputDate      = document.getElementById('inputDate');
    const selectHour     = document.getElementById('selectHour');
    const selectMin      = document.getElementById('selectMin');
    const selectPriority = document.getElementById('selectPriority');
    const checkAlarm     = document.getElementById('checkAlarm');
    const alarmLabel     = document.getElementById('alarmLabel');
    const inputColorCustom = document.getElementById('inputColorCustom');

    let selectedColor = '#ffff99';
    let selectedDays  = [];  // 반복 요일 (0=일, 1=월, ..., 6=토)
    let allCategories = [];  // 전체 태그 정의
    let selectedCategories = [];  // 선택된 태그 이름

    const DEFAULTS = { date: '', time: '', priority: 3, alarm: false, color: '#ffff99', alarmDays: [], contentType: 'html', categories: [] };
    const categoryWrap = document.getElementById('categoryWrap');

    // ── 알림 체크박스 활성/비활성 (시간만 있으면 활성) ──
    function updateAlarmState() {
      const hasTime = selectHour.value && selectMin.value;
      checkAlarm.disabled = !hasTime;
      alarmLabel.className = hasTime ? '' : 'disabled';
      if (!hasTime) checkAlarm.checked = false;
    }

    selectHour.addEventListener('change', updateAlarmState);
    selectMin.addEventListener('change', updateAlarmState);

    // ── 오늘 버튼 ───────────────────────────
    document.getElementById('btnToday').addEventListener('click', () => {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      const d = String(now.getDate()).padStart(2, '0');
      inputDate.value = `${y}-${m}-${d}`;
    });

    // ── 요일 토글 버튼 ──────────────────────
    document.querySelectorAll('.day-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const day = parseInt(btn.dataset.day, 10);
        const idx = selectedDays.indexOf(day);
        if (idx >= 0) {
          selectedDays.splice(idx, 1);
          btn.classList.remove('selected');
        } else {
          selectedDays.push(day);
          btn.classList.add('selected');
        }
      });
    });

    // ── 색상 프리셋 선택 ──────────────────────
    document.querySelectorAll('.color-swatch').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
        el.classList.add('selected');
        selectedColor = el.dataset.color;
        inputColorCustom.value = selectedColor;
      });
    });

    inputColorCustom.addEventListener('input', () => {
      selectedColor = inputColorCustom.value;
      // 커스텀 선택 시 프리셋 해제
      document.querySelectorAll('.color-swatch').forEach(s => {
        s.classList.toggle('selected', s.dataset.color === selectedColor);
      });
    });

    // ── Form 적용 / 수집 ─────────────────────
    function applyToForm(data) {
      inputDate.value = data.date || '';
      if (data.time) {
        const [h, m] = data.time.split(':');
        selectHour.value = h || '';
        selectMin.value  = m || '';
      } else {
        selectHour.value = '';
        selectMin.value  = '';
      }
      selectPriority.value = String(data.priority ?? 3);
      checkAlarm.checked   = data.alarm || false;

      // 색상
      selectedColor = data.color || '#ffff99';
      inputColorCustom.value = selectedColor;
      document.querySelectorAll('.color-swatch').forEach(s => {
        s.classList.toggle('selected', s.dataset.color === selectedColor);
      });

      // 요일 반복
      selectedDays = (data.alarmDays || []).slice();
      document.querySelectorAll('.day-btn').forEach(btn => {
        const day = parseInt(btn.dataset.day, 10);
        btn.classList.toggle('selected', selectedDays.includes(day));
      });

      // 편집 모드
      const mode = data.contentType || 'html';
      const radio = document.querySelector(`input[name="editMode"][value="${mode}"]`);
      if (radio) radio.checked = true;

      // 태그
      if (data.allCategories) allCategories = data.allCategories;
      selectedCategories = (data.categories || []).slice();
      renderCategories();

      updateAlarmState();
    }

    function contrastText(hex) {
      const c = hex.replace('#', '');
      const r = parseInt(c.substr(0, 2), 16);
      const g = parseInt(c.substr(2, 2), 16);
      const b = parseInt(c.substr(4, 2), 16);
      const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      return lum > 0.55 ? '#222' : '#fff';
    }

    function renderCategories() {
      categoryWrap.innerHTML = '';
      if (allCategories.length === 0) {
        categoryWrap.innerHTML = `<span class="cat-empty">${t('category.noCategories')}</span>`;
        return;
      }

      // 그룹별로 분류
      const grouped = {};   // { groupName: [cat, ...] }
      const ungrouped = []; // ':' 없는 태그
      allCategories.forEach(cat => {
        const colonIdx = cat.name.indexOf(':');
        if (colonIdx > 0) {
          const group = cat.name.substring(0, colonIdx);
          if (!grouped[group]) grouped[group] = [];
          grouped[group].push(cat);
        } else {
          ungrouped.push(cat);
        }
      });

      // 그룹 없는 태그 먼저
      ungrouped.forEach(cat => {
        categoryWrap.appendChild(makeCatLabel(cat, false));
      });

      // 그룹별 렌더링
      Object.keys(grouped).forEach(group => {
        const header = document.createElement('div');
        header.className = 'cat-group-header';
        header.textContent = group;
        categoryWrap.appendChild(header);

        grouped[group].forEach(cat => {
          categoryWrap.appendChild(makeCatLabel(cat, true));
        });
      });
    }

    function makeCatLabel(cat, indented) {
      const label = document.createElement('label');
      label.className = 'cat-check-label' + (indented ? '' : ' no-group');
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = selectedCategories.includes(cat.name);
      cb.addEventListener('change', () => {
        if (cb.checked) {
          if (!selectedCategories.includes(cat.name)) selectedCategories.push(cat.name);
        } else {
          selectedCategories = selectedCategories.filter(n => n !== cat.name);
        }
      });
      const badge = document.createElement('span');
      badge.className = 'cat-badge';
      badge.style.background = cat.color;
      badge.style.color = contrastText(cat.color);
      // 그룹에 속한 태그는 ':' 뒤 이름만 표시
      const colonIdx = cat.name.indexOf(':');
      badge.textContent = colonIdx > 0 ? cat.name.substring(colonIdx + 1) : cat.name;
      label.appendChild(cb);
      label.appendChild(badge);
      return label;
    }

    function getFormData() {
      const h = selectHour.value;
      const m = selectMin.value;
      const time = (h && m) ? `${h}:${m}` : '';
      return {
        date:        inputDate.value,
        time,
        priority:    parseInt(selectPriority.value, 10),
        alarm:       checkAlarm.checked,
        alarmDays:   selectedDays.slice().sort(),
        color:       selectedColor,
        contentType: document.querySelector('input[name="editMode"]:checked').value,
        categories:  selectedCategories.slice(),
      };
    }

    // ── IPC ──────────────────────────────────
    ipcRenderer.on('init-properties', (_e, data) => {
      applyToForm(data);
    });

    document.getElementById('btnSave').addEventListener('click', () => {
      ipcRenderer.send('properties-save', getFormData());
    });

    document.getElementById('btnCancel').addEventListener('click', () => {
      ipcRenderer.send('properties-cancel');
    });

    document.getElementById('btnReset').addEventListener('click', () => {
      applyToForm(DEFAULTS);
    });

    // 키보드 단축키
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        ipcRenderer.send('properties-cancel');
      } else if (e.ctrlKey && e.key === 'Enter') {
        ipcRenderer.send('properties-save', getFormData());
      }
    });
  </script>
</body>
</html>
