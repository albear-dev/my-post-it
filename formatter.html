<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Change Formatting</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: '맑은 고딕', Malgun Gothic, sans-serif;
      font-size: 13px;
      background: #f8f8f8;
      color: #333;
      padding: 16px 18px;
      user-select: none;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .lbl {
      width: 68px;
      font-weight: 600;
      flex-shrink: 0;
      font-size: 12px;
    }

    select, input[type="number"] {
      padding: 4px 6px;
      border: 1px solid #ccc;
      border-radius: 3px;
      font-family: inherit;
      font-size: 13px;
      background: white;
    }

    select { flex: 1; cursor: pointer; }

    input[type="number"] { width: 56px; }

    .unit { color: #777; font-size: 12px; }

    .checkboxes { display: flex; gap: 20px; }

    .chk-label {
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
    }

    input[type="checkbox"] { width: 14px; height: 14px; cursor: pointer; }

    input[type="color"] {
      width: 36px;
      height: 26px;
      border: 1px solid #ccc;
      border-radius: 3px;
      padding: 2px;
      cursor: pointer;
      background: none;
    }

    .color-presets {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-left: 6px;
    }
    .color-swatch {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .color-swatch:hover { border-color: #888; }

    .btn-none {
      padding: 2px 8px;
      border: 1px solid #ccc;
      border-radius: 3px;
      background: #fff;
      cursor: pointer;
      font-size: 11px;
      color: #999;
    }
    .btn-none:hover { border-color: #888; color: #333; }

    .preview-wrap {
      margin: 12px 0;
      padding: 8px 10px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 3px;
      min-height: 38px;
      display: flex;
      align-items: center;
    }

    #preview {
      font-family: '맑은 고딕', Malgun Gothic, sans-serif;
      font-size: 10pt;
      color: #333;
      word-break: break-all;
    }

    hr { border: none; border-top: 1px solid #ddd; margin: 12px 0; }

    .btns {
      display: flex;
      justify-content: flex-end;
      gap: 7px;
    }

    button {
      padding: 5px 14px;
      border: 1px solid #bbb;
      border-radius: 3px;
      background: #fff;
      cursor: pointer;
      font-family: '맑은 고딕', Malgun Gothic, sans-serif;
      font-size: 13px;
    }

    button:hover { background: #eee; }

    #btnReset {
      margin-right: auto; /* 왼쪽 정렬 */
      border-color: #aaa;
      color: #555;
    }

    #btnReset:hover { background: #f0f0f0; color: #c00; border-color: #c00; }

    #btnSave {
      background: #ffe066;
      border-color: #ccaa00;
      font-weight: 600;
    }

    #btnSave:hover { background: #ffd633; }
  </style>
</head>
<body>
  <!-- Font -->
  <div class="row">
    <span class="lbl" data-i18n="formatter.font">Font</span>
    <select id="fontFamily">
      <option value="Malgun Gothic" style="font-family:'Malgun Gothic'" data-i18n="font.malgunGothic">Malgun Gothic</option>
      <option value="Gulim"         style="font-family:Gulim" data-i18n="font.gulim">Gulim</option>
      <option value="Dotum"         style="font-family:Dotum" data-i18n="font.dotum">Dotum</option>
      <option value="Batang"        style="font-family:Batang" data-i18n="font.batang">Batang</option>
      <option value="Gungsuh"       style="font-family:Gungsuh" data-i18n="font.gungsuh">Gungsuh</option>
      <option value="Arial"         style="font-family:Arial">Arial</option>
      <option value="Times New Roman" style="font-family:'Times New Roman'">Times New Roman</option>
      <option value="Courier New"   style="font-family:'Courier New'">Courier New</option>
    </select>
  </div>

  <!-- Font Size -->
  <div class="row">
    <span class="lbl" data-i18n="formatter.fontSize">Font Size</span>
    <input type="number" id="fontSize" min="6" max="144" value="10">
    <span class="unit">pt</span>
  </div>

  <!-- Style -->
  <div class="row">
    <span class="lbl" data-i18n="formatter.style">Style</span>
    <div class="checkboxes">
      <label class="chk-label"><input type="checkbox" id="bold"> <span data-i18n="formatter.bold">Bold</span></label>
      <label class="chk-label"><input type="checkbox" id="italic"> <span data-i18n="formatter.italic">Italic</span></label>
      <label class="chk-label"><input type="checkbox" id="underline"> <span data-i18n="formatter.underline">Underline</span></label>
      <label class="chk-label"><input type="checkbox" id="strikethrough"> <span data-i18n="formatter.strikethrough">Strikethrough</span></label>
    </div>
  </div>

  <!-- Font Color -->
  <div class="row">
    <span class="lbl" data-i18n="formatter.fontColor">Font Color</span>
    <input type="color" id="color" value="#333333">
    <div class="color-presets">
      <span class="color-swatch" data-color="#333333" style="background:#333333;"></span>
      <span class="color-swatch" data-color="#cc0000" style="background:#cc0000;"></span>
      <span class="color-swatch" data-color="#0066cc" style="background:#0066cc;"></span>
      <span class="color-swatch" data-color="#008800" style="background:#008800;"></span>
      <span class="color-swatch" data-color="#ff6600" style="background:#ff6600;"></span>
      <span class="color-swatch" data-color="#9933cc" style="background:#9933cc;"></span>
      <span class="color-swatch" data-color="#888888" style="background:#888888;"></span>
    </div>
  </div>

  <!-- Background Color -->
  <div class="row">
    <span class="lbl" data-i18n="formatter.bgColor">배경색</span>
    <input type="color" id="bgColor" value="#fff9c4">
    <button type="button" id="bgColorNone" class="btn-none" data-i18n="formatter.none">없음</button>
    <div class="color-presets">
      <span class="color-swatch" data-bgcolor="#fff9c4" style="background:#fff9c4;"></span>
      <span class="color-swatch" data-bgcolor="#fce4ec" style="background:#fce4ec;"></span>
      <span class="color-swatch" data-bgcolor="#e3f2fd" style="background:#e3f2fd;"></span>
      <span class="color-swatch" data-bgcolor="#e8f5e9" style="background:#e8f5e9;"></span>
      <span class="color-swatch" data-bgcolor="#f3e5f5" style="background:#f3e5f5;"></span>
      <span class="color-swatch" data-bgcolor="#fff3e0" style="background:#fff3e0;"></span>
    </div>
  </div>

  <!-- Link URL -->
  <div class="row">
    <span class="lbl" data-i18n="formatter.linkUrl">링크</span>
    <input type="text" id="linkUrl" placeholder="https://" spellcheck="false" style="flex:1; padding:4px 6px; border:1px solid #ccc; border-radius:3px; font-size:13px;">
    <button type="button" id="linkClear" class="btn-none" data-i18n="formatter.none">없음</button>
  </div>

  <!-- Preview -->
  <div class="preview-wrap">
    <span id="preview" data-i18n="formatter.preview">Preview Text</span>
  </div>

  <hr>

  <div class="btns">
    <button id="btnReset" data-i18n="formatter.reset">Reset Formatting</button>
    <button id="btnCancel" data-i18n="formatter.cancel">Cancel</button>
    <button id="btnSave" data-i18n="formatter.save">Save</button>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    // ── i18n ─────────────────────────────────────────────
    let _translations = {};
    function t(key, params) {
      let str = _translations[key] || key;
      if (params) Object.entries(params).forEach(([k,v]) => { str = str.replace(`{${k}}`, v); });
      return str;
    }
    function applyTranslations() {
      document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
      document.querySelectorAll('[data-i18n-title]').forEach(el => { el.title = t(el.dataset.i18nTitle); });
    }
    ipcRenderer.on('set-translations', (_e, tr) => { _translations = tr; applyTranslations(); });

    const elFont          = document.getElementById('fontFamily');
    const elFontSize      = document.getElementById('fontSize');
    const elBold          = document.getElementById('bold');
    const elItalic        = document.getElementById('italic');
    const elUnderline     = document.getElementById('underline');
    const elStrikethrough = document.getElementById('strikethrough');
    const elColor         = document.getElementById('color');
    const elBgColor       = document.getElementById('bgColor');
    const elBgColorNone   = document.getElementById('bgColorNone');
    const elLinkUrl       = document.getElementById('linkUrl');
    const elLinkClear     = document.getElementById('linkClear');
    const preview         = document.getElementById('preview');

    let bgColorValue = '';  // '' = 배경 없음, '#xxx' = 배경색

    const DEFAULTS = {
      fontFamily:     'Malgun Gothic',
      fontSize:       10,
      bold:           false,
      italic:         false,
      underline:      false,
      strikethrough:  false,
      color:          '#333333',
      bgColor:        '',
      linkUrl:        '',
    };

    function applyToForm(data) {
      elFont.value              = data.fontFamily     ?? DEFAULTS.fontFamily;
      elFontSize.value          = data.fontSize       ?? DEFAULTS.fontSize;
      elBold.checked            = data.bold           ?? DEFAULTS.bold;
      elItalic.checked          = data.italic         ?? DEFAULTS.italic;
      elUnderline.checked       = data.underline      ?? DEFAULTS.underline;
      elStrikethrough.checked   = data.strikethrough  ?? DEFAULTS.strikethrough;
      elColor.value             = data.color          ?? DEFAULTS.color;
      bgColorValue              = data.bgColor        ?? DEFAULTS.bgColor;
      elLinkUrl.value           = data.linkUrl        ?? DEFAULTS.linkUrl;
      if (bgColorValue) elBgColor.value = bgColorValue;
      elBgColor.style.opacity   = bgColorValue ? '1' : '0.4';
      updatePreview();
    }

    function updatePreview() {
      preview.style.fontFamily      = `'${elFont.value}', sans-serif`;
      preview.style.fontSize        = `${elFontSize.value}pt`;
      preview.style.fontWeight      = elBold.checked ? 'bold' : 'normal';
      preview.style.fontStyle       = elItalic.checked ? 'italic' : 'normal';
      preview.style.color           = elColor.value;
      preview.style.backgroundColor = bgColorValue || 'transparent';
      elBgColor.style.opacity       = bgColorValue ? '1' : '0.4';
      const deco = [];
      if (elUnderline.checked)     deco.push('underline');
      if (elStrikethrough.checked) deco.push('line-through');
      preview.style.textDecoration = deco.length > 0 ? deco.join(' ') : 'none';
    }

    // 초기 값 수신
    ipcRenderer.on('init-formatter', (_e, data) => applyToForm(data));

    // 실시간 미리보기
    [elFont, elFontSize, elBold, elItalic, elUnderline, elStrikethrough, elColor].forEach(el => {
      el.addEventListener('input',  updatePreview);
      el.addEventListener('change', updatePreview);
    });

    // 글자색 프리셋 클릭
    document.querySelectorAll('.color-swatch[data-color]').forEach(el => {
      el.addEventListener('click', () => {
        elColor.value = el.dataset.color;
        updatePreview();
      });
    });

    // 배경색 관련 이벤트
    elBgColor.addEventListener('input', () => {
      bgColorValue = elBgColor.value;
      updatePreview();
    });
    elBgColor.addEventListener('change', () => {
      bgColorValue = elBgColor.value;
      updatePreview();
    });
    elBgColorNone.addEventListener('click', () => {
      bgColorValue = '';
      updatePreview();
    });
    document.querySelectorAll('.color-swatch[data-bgcolor]').forEach(el => {
      el.addEventListener('click', () => {
        bgColorValue = el.dataset.bgcolor;
        elBgColor.value = bgColorValue;
        updatePreview();
      });
    });

    // 링크 초기화
    elLinkClear.addEventListener('click', () => { elLinkUrl.value = ''; });

    // 속성 초기화
    document.getElementById('btnReset').addEventListener('click', () => applyToForm(DEFAULTS));

    // 저장
    document.getElementById('btnSave').addEventListener('click', () => {
      ipcRenderer.send('formatter-apply', {
        fontFamily:    elFont.value,
        fontSize:      parseInt(elFontSize.value, 10) || DEFAULTS.fontSize,
        bold:          elBold.checked,
        italic:        elItalic.checked,
        underline:     elUnderline.checked,
        strikethrough: elStrikethrough.checked,
        color:         elColor.value,
        bgColor:       bgColorValue,
        linkUrl:       elLinkUrl.value.trim(),
      });
    });

    // 취소
    document.getElementById('btnCancel').addEventListener('click', () => {
      ipcRenderer.send('formatter-cancel');
    });

    // 단축키: ESC → 취소, Ctrl+Enter → 저장
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') ipcRenderer.send('formatter-cancel');
      if (e.key === 'Enter' && e.ctrlKey) document.getElementById('btnSave').click();
    });
  </script>
</body>
</html>
