<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>New Postit</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
    background: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    user-select: none;
  }
  .container {
    text-align: center;
    padding: 20px;
  }
  .title {
    font-size: 11pt;
    font-weight: 600;
    color: #333;
    margin-bottom: 20px;
  }
  .buttons {
    display: flex;
    gap: 16px;
    justify-content: center;
  }
  .type-btn {
    width: 120px;
    padding: 16px 12px;
    border: 2px solid #ddd;
    border-radius: 10px;
    background: #fff;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .type-btn:hover {
    border-color: #888;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .type-btn:active {
    background: #f0f0f0;
  }
  .type-btn .icon {
    font-size: 28px;
    line-height: 1;
  }
  .type-btn .label {
    font-size: 10pt;
    font-weight: 600;
    color: #333;
  }
  .type-btn .desc {
    font-size: 8pt;
    color: #888;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="title" data-i18n="newPostit.selectType">편집 모드를 선택하세요</div>
    <div class="buttons">
      <button class="type-btn" id="btnHtml">
        <span class="icon">📝</span>
        <span class="label" data-i18n="newPostit.editor">에디터</span>
        <span class="desc" data-i18n="newPostit.editorDesc">WYSIWYG</span>
      </button>
      <button class="type-btn" id="btnWiki">
        <span class="icon">📄</span>
        <span class="label" data-i18n="newPostit.markdown">마크다운</span>
        <span class="desc" data-i18n="newPostit.markdownDesc">Markdown</span>
      </button>
    </div>
  </div>

<script>
  const { ipcRenderer } = require('electron');

  ipcRenderer.on('set-translations', (_, translations) => {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (translations[key]) el.textContent = translations[key];
    });
  });

  document.getElementById('btnHtml').addEventListener('click', () => {
    ipcRenderer.send('newpostit-select', 'html');
  });

  document.getElementById('btnWiki').addEventListener('click', () => {
    ipcRenderer.send('newpostit-select', 'wiki');
  });

  // ESC로 취소
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      ipcRenderer.send('newpostit-cancel');
    }
  });
</script>
</body>
</html>
