<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Notification</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: '맑은 고딕', Malgun Gothic, sans-serif;
      font-size: 9pt;
      background: #fff;
      overflow: hidden;
      border: 1px solid #ccc;
      border-radius: 8px;
      animation: slideUp 0.35s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    /* 헤더 */
    .header {
      display: flex;
      align-items: center;
      padding: 8px 10px 4px;
      gap: 6px;
    }

    .priority-badge {
      font-size: 11px;
      font-weight: bold;
      flex-shrink: 0;
    }

    .title {
      flex: 1;
      font-size: 11px;
      font-weight: bold;
      color: #333;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .close-btn {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 14px;
      color: #999;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
    }
    .close-btn:hover { background: #eee; color: #333; }

    /* 날짜/시간 정보 */
    .info {
      padding: 2px 10px 6px;
      font-size: 10px;
      color: #888;
    }

    /* 내용 미리보기 */
    .preview {
      padding: 0 10px 8px;
      font-size: 9pt;
      color: #555;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-height: 20px;
    }

    /* 버튼 영역 */
    .buttons {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      padding: 4px 10px 10px;
      border-top: 1px solid #eee;
    }

    .buttons button {
      padding: 5px 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 9pt;
    }
    .buttons button:hover { background: #f0f0f0; }

    #btnSnooze {
      background: #4a8df8;
      color: #fff;
      border-color: #4a8df8;
    }
    #btnSnooze:hover { background: #3a7de8; }

    #btnCancel {
      color: #c33;
      border-color: #c33;
    }
    #btnCancel:hover { background: #fee; }
  </style>
</head>
<body>
  <div class="header">
    <span class="priority-badge" id="priorityBadge"></span>
    <span class="title" id="titleText"></span>
    <button class="close-btn" id="btnDismiss" data-i18n-title="notification.dismiss" title="Dismiss (Close)">✕</button>
  </div>
  <div class="info" id="infoText"></div>
  <div class="preview" id="previewText"></div>
  <div class="buttons">
    <button id="btnCancel" data-i18n="notification.cancelAlarm">Cancel Alarm</button>
    <button id="btnSnooze" data-i18n="notification.snooze">Snooze 30min</button>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    // ── i18n ─────────────────────────────────────────────
    let _translations = {};
    function t(key, params) {
      let str = _translations[key] || key;
      if (params) Object.entries(params).forEach(([k,v]) => { str = str.replace(`{${k}}`, v); });
      return str;
    }
    function applyTranslations() {
      document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
      document.querySelectorAll('[data-i18n-title]').forEach(el => { el.title = t(el.dataset.i18nTitle); });
      if (_notifData) renderNotification(_notifData);
    }
    ipcRenderer.on('set-translations', (_e, tr) => { _translations = tr; applyTranslations(); });

    const PRIORITY_COLORS = { 1: '#e53935', 2: '#f9a825', 3: '#1e88e5', 4: '#43a047', 5: '#888888' };

    let postitId = null;
    let _notifData = null;

    function renderNotification(data) {
      const p = data.priority ?? 3;
      const badge = document.getElementById('priorityBadge');
      badge.textContent = `[${p}]`;
      badge.style.color = PRIORITY_COLORS[p] || '#1e88e5';

      let firstLine;
      if (data.contentType === 'wiki') {
        const lines = (data.content || '').split('\n');
        firstLine = '';
        for (const line of lines) {
          let clean = line.trim();
          if (!clean) continue;
          clean = clean.replace(/^#{1,3}\s+/, '').replace(/^>\s*/, '');
          clean = clean.replace(/^-\s+\[[ xX]\]\s*/, '').replace(/^-\s+/, '').replace(/^\d+\.\s+/, '');
          clean = clean.replace(/\*\*([^*]+)\*\*/g, '$1').replace(/\*([^*]+)\*/g, '$1');
          clean = clean.replace(/`([^`]+)`/g, '$1').replace(/\[([^\]]+)\]\([^)]+\)/g, '$1');
          if (clean) { firstLine = clean; break; }
        }
        firstLine = firstLine || t('postit.empty');
      } else {
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = data.content || '';
        firstLine = tempDiv.innerText.split('\n').find(l => l.trim()) || t('postit.empty');
      }
      document.getElementById('titleText').textContent = firstLine;

      const parts = [];
      const alarmDays = data.alarmDays || [];
      if (alarmDays.length > 0) {
        const dayNames = alarmDays.sort((a, b) => a - b).map(d => t(`day.${d}`));
        parts.push(`${t('notification.weekly')} ${dayNames.join(',')}`);
      } else if (data.date) {
        parts.push(data.date);
      } else {
        parts.push(t('notification.daily'));
      }
      if (data.time) parts.push(data.time);
      document.getElementById('infoText').textContent = parts.join(' ') || '';

      let previewLine = '';
      if (data.contentType === 'wiki') {
        const wikiLines = (data.content || '').split('\n').filter(l => l.trim());
        previewLine = wikiLines.length > 1 ? wikiLines[1].replace(/[#*`>\[\]()-]/g, '').trim() : '';
      } else {
        const tempDiv2 = document.createElement('div');
        tempDiv2.innerHTML = data.content || '';
        const htmlLines = tempDiv2.innerText.split('\n').filter(l => l.trim());
        previewLine = htmlLines.length > 1 ? htmlLines[1] : '';
      }
      document.getElementById('previewText').textContent = previewLine;
    }

    ipcRenderer.on('init-notification', (_e, data) => {
      postitId = data.id;
      _notifData = data;
      renderNotification(data);
    });

    document.getElementById('btnSnooze').addEventListener('click', () => {
      if (postitId) ipcRenderer.send('notification-snooze', { id: postitId });
    });

    document.getElementById('btnCancel').addEventListener('click', () => {
      if (postitId) ipcRenderer.send('notification-cancel', { id: postitId });
    });

    document.getElementById('btnDismiss').addEventListener('click', () => {
      if (postitId) ipcRenderer.send('notification-dismiss', { id: postitId });
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        if (postitId) ipcRenderer.send('notification-dismiss', { id: postitId });
      }
    });
  </script>
</body>
</html>
