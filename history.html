<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Backup History</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: '맑은 고딕', Malgun Gothic, sans-serif;
      font-size: 9pt;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* ── 헤더 ────────────────────────────────────────── */
    #header {
      padding: 10px 14px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      font-size: 11pt;
      font-weight: 600;
      color: #333;
      flex-shrink: 0;
    }

    /* ── 백업 테이블 ────────────────────────────────── */
    #backup-list {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead {
      position: sticky;
      top: 0;
      z-index: 1;
    }
    thead th {
      background: #f0f0f0;
      border-bottom: 2px solid #ccc;
      padding: 6px 10px;
      text-align: left;
      font-size: 8.5pt;
      font-weight: 600;
      color: #555;
      white-space: nowrap;
    }
    tbody tr {
      cursor: pointer;
      border-bottom: 1px solid #eee;
    }
    tbody tr:hover { background: #e3f2fd; }
    tbody tr.selected { background: #bbdefb; }
    tbody td {
      padding: 5px 10px;
      font-size: 8.5pt;
      color: #333;
      white-space: nowrap;
    }
    td.size-col { text-align: right; }

    /* ── 액션 버튼 ──────────────────────────────────── */
    .action-btn {
      padding: 2px 8px;
      border: 1px solid #bbb;
      border-radius: 3px;
      background: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 8pt;
      margin-right: 4px;
    }
    .action-btn:hover { background: #eee; }
    .action-btn.restore { color: #1e88e5; border-color: #1e88e5; }
    .action-btn.restore:hover { background: #e3f2fd; }
    .action-btn.delete { color: #e53935; border-color: #e53935; }
    .action-btn.delete:hover { background: #fdecea; }

    /* ── 미리보기 패널 ─────────────────────────────── */
    #preview-panel {
      border-top: 2px solid #ccc;
      background: #fff;
      max-height: 160px;
      overflow-y: auto;
      padding: 8px 14px;
      flex-shrink: 0;
      display: none;
    }
    #preview-panel h3 {
      font-size: 8.5pt;
      color: #555;
      margin-bottom: 4px;
    }
    #preview-panel .preview-item {
      font-size: 8.5pt;
      color: #333;
      padding: 1px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── 빈 상태 ─────────────────────────────────────── */
    #empty-msg {
      flex: 1;
      display: none;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 10pt;
    }

    /* ── 토스트 ─────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: -36px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 6px 18px;
      border-radius: 18px;
      font-size: 9pt;
      transition: bottom 0.3s ease;
      z-index: 999;
      pointer-events: none;
    }
    #toast.show { bottom: 14px; }
  </style>
</head>
<body>

  <div id="header" data-i18n="window.historyTitle">Backup History</div>

  <div id="backup-list">
    <table>
      <thead>
        <tr>
          <th data-i18n="history.date">Date</th>
          <th data-i18n="history.count">Postit Count</th>
          <th data-i18n="history.size">Size</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="backup-tbody"></tbody>
    </table>
  </div>

  <div id="empty-msg" data-i18n="history.empty">No backups.</div>

  <div id="preview-panel">
    <h3 data-i18n="history.preview">Preview</h3>
    <div id="preview-content"></div>
  </div>

  <div id="toast"></div>

<script>
  const { ipcRenderer } = require('electron');

  // ── i18n ────────────────────────────────────────────
  let _translations = {};
  function t(key, params) {
    let str = _translations[key] || key;
    if (params) Object.entries(params).forEach(([k, v]) => { str = str.replace(`{${k}}`, v); });
    return str;
  }
  function applyTranslations() {
    document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
  }
  ipcRenderer.on('set-translations', (_e, tr) => { _translations = tr; applyTranslations(); });

  // ── DOM 참조 ────────────────────────────────────────
  const tbody         = document.getElementById('backup-tbody');
  const emptyMsg      = document.getElementById('empty-msg');
  const backupList    = document.getElementById('backup-list');
  const previewPanel  = document.getElementById('preview-panel');
  const previewContent= document.getElementById('preview-content');
  const toast         = document.getElementById('toast');

  let backups = [];

  // ── 백업 목록 렌더링 ─────────────────────────────
  function renderList(data) {
    backups = data;
    tbody.innerHTML = '';
    previewPanel.style.display = 'none';

    if (backups.length === 0) {
      backupList.style.display = 'none';
      emptyMsg.style.display = 'flex';
      return;
    }

    backupList.style.display = '';
    emptyMsg.style.display = 'none';

    backups.forEach((b, idx) => {
      const tr = document.createElement('tr');

      // 날짜/시간
      const tdDate = document.createElement('td');
      tdDate.textContent = b.timestamp;
      tr.appendChild(tdDate);

      // 포스트잇 수
      const tdCount = document.createElement('td');
      tdCount.textContent = b.count;
      tr.appendChild(tdCount);

      // 파일 크기
      const tdSize = document.createElement('td');
      tdSize.className = 'size-col';
      tdSize.textContent = formatSize(b.size);
      tr.appendChild(tdSize);

      // 액션 버튼
      const tdAction = document.createElement('td');

      const btnPreview = document.createElement('button');
      btnPreview.className = 'action-btn';
      btnPreview.textContent = t('history.preview');
      btnPreview.addEventListener('click', (e) => {
        e.stopPropagation();
        showPreview(b.filename);
        // 선택 표시
        tbody.querySelectorAll('tr').forEach(r => r.classList.remove('selected'));
        tr.classList.add('selected');
      });
      tdAction.appendChild(btnPreview);

      const btnRestore = document.createElement('button');
      btnRestore.className = 'action-btn restore';
      btnRestore.textContent = t('history.restore');
      btnRestore.addEventListener('click', (e) => {
        e.stopPropagation();
        confirmRestore(b.filename);
      });
      tdAction.appendChild(btnRestore);

      const btnDelete = document.createElement('button');
      btnDelete.className = 'action-btn delete';
      btnDelete.textContent = t('history.delete');
      btnDelete.addEventListener('click', (e) => {
        e.stopPropagation();
        confirmDelete(b.filename);
      });
      tdAction.appendChild(btnDelete);

      tr.appendChild(tdAction);

      // 행 클릭 → 미리보기
      tr.addEventListener('click', () => {
        showPreview(b.filename);
        tbody.querySelectorAll('tr').forEach(r => r.classList.remove('selected'));
        tr.classList.add('selected');
      });

      tbody.appendChild(tr);
    });
  }

  // ── 유틸리티 ────────────────────────────────────────
  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1024 / 1024).toFixed(1) + ' MB';
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  }

  // ── 미리보기 ────────────────────────────────────────
  async function showPreview(filename) {
    const result = await ipcRenderer.invoke('preview-backup', { filename });
    if (!result) return;

    previewContent.innerHTML = '';
    result.titles.forEach(title => {
      const div = document.createElement('div');
      div.className = 'preview-item';
      div.textContent = title || '(empty)';
      previewContent.appendChild(div);
    });
    previewPanel.style.display = '';
  }

  // ── 복구 ────────────────────────────────────────────
  async function confirmRestore(filename) {
    const ok = confirm(t('history.confirmRestore'));
    if (!ok) return;

    const result = await ipcRenderer.invoke('restore-backup', { filename });
    if (result) {
      showToast(t('history.restoreComplete'));
    }
  }

  // ── 삭제 ────────────────────────────────────────────
  function confirmDelete(filename) {
    const ok = confirm(t('history.confirmDelete'));
    if (!ok) return;
    ipcRenderer.send('delete-backup', { filename });
  }

  // ── 키보드 단축키 ──────────────────────────────────
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') window.close();
  });

  // ── IPC: 데이터 수신 ──────────────────────────────
  ipcRenderer.on('history-updated', (_e, data) => {
    renderList(data);
  });
</script>
</body>
</html>
