<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tag Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: '맑은 고딕', Malgun Gothic, sans-serif;
      font-size: 9pt;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* ── 상단: 추가/편집 폼 ── */
    .add-form {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px 14px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .add-form.edit-mode {
      background: #eef4ff;
      border-bottom-color: #a0c0ff;
    }

    .add-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .add-label {
      font-size: 8.5pt;
      color: #555;
      font-weight: 600;
      width: 42px;
      flex-shrink: 0;
    }

    .add-row input[type="text"] {
      flex: 1;
      padding: 5px 8px;
      border: 1px solid #bbb;
      border-radius: 3px;
      font-family: inherit;
      font-size: 9pt;
    }
    .add-row input[type="text"]:focus {
      outline: none;
      border-color: #5c9eff;
      box-shadow: 0 0 3px rgba(92,158,255,0.4);
    }

    .color-pick-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .color-pick-wrap input[type="color"] {
      width: 28px; height: 28px;
      border: 1px solid #ccc;
      border-radius: 3px;
      padding: 1px;
      cursor: pointer;
      background: none;
    }
    .color-pick-wrap input[type="text"] {
      width: 72px;
      padding: 5px 6px;
      border: 1px solid #bbb;
      border-radius: 3px;
      font-family: 'Consolas', monospace;
      font-size: 8.5pt;
    }

    .color-presets {
      display: flex;
      gap: 4px;
      align-items: center;
      flex-wrap: wrap;
    }
    .color-swatch {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .color-swatch:hover { border-color: #888; }
    .color-swatch.active { border-color: #333; }

    .btn-row {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
    }
    .btn-row button {
      padding: 6px 20px;
      border: 1px solid #bbb;
      border-radius: 3px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      font-size: 9pt;
      white-space: nowrap;
    }
    #btnAdd {
      background: #ffe066;
      border-color: #ccaa00;
    }
    #btnAdd:hover { background: #ffd633; }
    #btnUpdate {
      background: #4a8df8;
      color: #fff;
      border-color: #4a8df8;
    }
    #btnUpdate:hover { background: #3a7de8; }
    #btnEditCancel {
      background: #fff;
    }
    #btnEditCancel:hover { background: #eee; }

    /* ── 태그 목록 ──────────────── */
    .cat-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    .cat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      border-bottom: 1px solid #eee;
      cursor: default;
    }
    .cat-item:hover { background: #fafaf0; }
    .cat-item.active-edit { background: #e8f0fe; }

    .cat-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 8.5pt;
      font-weight: 600;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .cat-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cat-item button {
      padding: 3px 10px;
      border: 1px solid #ccc;
      border-radius: 3px;
      background: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 8pt;
    }
    .cat-item button:hover { background: #eee; }
    .cat-item .btn-del { color: #c00; border-color: #c00; }
    .cat-item .btn-del:hover { background: #fee; }

    .cat-group-header {
      padding: 6px 14px 3px;
      font-size: 8pt;
      font-weight: 700;
      color: #666;
      background: #f0f0f0;
      border-bottom: 1px solid #e0e0e0;
      user-select: none;
    }
    .cat-item.grouped {
      padding-left: 28px;
    }

    /* ── 하단 버튼 ──────────────────── */
    .bottom-bar {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 10px 14px;
      border-top: 1px solid #ddd;
      background: #fff;
      flex-shrink: 0;
    }
    .bottom-bar button {
      padding: 6px 18px;
      border: 1px solid #bbb;
      border-radius: 3px;
      background: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 9pt;
    }
    .bottom-bar button:hover { background: #eee; }
    #btnSave {
      background: #4a8df8;
      color: #fff;
      border-color: #4a8df8;
    }
    #btnSave:hover { background: #3a7de8; }

    .empty-msg {
      text-align: center;
      padding: 30px;
      color: #999;
      font-size: 9.5pt;
    }

    .cat-list::-webkit-scrollbar { width: 8px; }
    .cat-list::-webkit-scrollbar-track { background: transparent; }
    .cat-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
  </style>
</head>
<body>

  <!-- 추가/편집 폼 -->
  <div class="add-form" id="addForm">
    <div class="add-row">
      <span class="add-label" data-i18n="category.name">이름</span>
      <input type="text" id="inputName" data-i18n-placeholder="category.namePlaceholder" placeholder="그룹명:태그명">
    </div>
    <div class="add-row">
      <span class="add-label" data-i18n="category.color">색상</span>
      <div class="color-pick-wrap">
        <input type="color" id="inputColor" value="#90caf9">
        <input type="text" id="inputHex" value="#90caf9" data-i18n-placeholder="category.hexPlaceholder" placeholder="#000000" maxlength="7">
      </div>
      <div class="color-presets">
        <span class="color-swatch" data-color="#f8a0a0" style="background:#f8a0a0;"></span>
        <span class="color-swatch" data-color="#ffcc80" style="background:#ffcc80;"></span>
        <span class="color-swatch" data-color="#fff59d" style="background:#fff59d;"></span>
        <span class="color-swatch" data-color="#a5d6a7" style="background:#a5d6a7;"></span>
        <span class="color-swatch active" data-color="#90caf9" style="background:#90caf9;"></span>
        <span class="color-swatch" data-color="#9fa8da" style="background:#9fa8da;"></span>
        <span class="color-swatch" data-color="#ce93d8" style="background:#ce93d8;"></span>
        <span class="color-swatch" data-color="#bdbdbd" style="background:#bdbdbd;"></span>
        <span class="color-swatch" data-color="#555555" style="background:#555555;"></span>
      </div>
    </div>
    <div class="btn-row">
      <button id="btnEditCancel" style="display:none;" data-i18n="category.cancel">취소</button>
      <button id="btnUpdate" style="display:none;" data-i18n="category.save">저장</button>
      <button id="btnAdd" data-i18n="category.add">추가</button>
    </div>
  </div>

  <!-- 태그 목록 -->
  <div class="cat-list" id="catList"></div>

  <!-- 하단 -->
  <div class="bottom-bar">
    <button id="btnCancel" data-i18n="category.cancel">취소</button>
    <button id="btnSave" data-i18n="category.save">저장</button>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    // ── i18n ─────────────────────────────
    let _translations = {};
    function t(key) { return _translations[key] || key; }
    function applyTranslations() {
      document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { el.placeholder = t(el.dataset.i18nPlaceholder); });
    }
    ipcRenderer.on('set-translations', (_e, tr) => { _translations = tr; applyTranslations(); });

    // ── State ────────────────────────────
    let categories = [];
    let editingIdx = -1;

    const addForm    = document.getElementById('addForm');
    const inputName  = document.getElementById('inputName');
    const inputColor = document.getElementById('inputColor');
    const inputHex   = document.getElementById('inputHex');
    const catList    = document.getElementById('catList');
    const btnAdd     = document.getElementById('btnAdd');
    const btnUpdate  = document.getElementById('btnUpdate');
    const btnEditCancel = document.getElementById('btnEditCancel');

    // ── 색상 동기화 ─────────────────────
    function updateSwatchHighlight() {
      document.querySelectorAll('.add-form .color-swatch').forEach(el => {
        el.classList.toggle('active', el.dataset.color === inputColor.value);
      });
    }

    inputColor.addEventListener('input', () => {
      inputHex.value = inputColor.value;
      updateSwatchHighlight();
    });
    inputHex.addEventListener('input', () => {
      const v = inputHex.value.trim();
      if (/^#[0-9a-fA-F]{6}$/.test(v)) {
        inputColor.value = v;
        updateSwatchHighlight();
      }
    });

    document.querySelectorAll('.add-form .color-swatch').forEach(el => {
      el.addEventListener('click', () => {
        inputColor.value = el.dataset.color;
        inputHex.value = el.dataset.color;
        updateSwatchHighlight();
      });
    });
    updateSwatchHighlight();

    // ── 폼 모드 전환 ────────────────────
    function setFormMode(mode) {
      if (mode === 'edit') {
        addForm.classList.add('edit-mode');
        btnAdd.style.display = 'none';
        btnUpdate.style.display = '';
        btnEditCancel.style.display = '';
      } else {
        addForm.classList.remove('edit-mode');
        btnAdd.style.display = '';
        btnUpdate.style.display = 'none';
        btnEditCancel.style.display = 'none';
        editingIdx = -1;
      }
    }

    function startEdit(idx) {
      const cat = categories[idx];
      editingIdx = idx;
      inputName.value = cat.name;
      inputColor.value = cat.color;
      inputHex.value = cat.color;
      updateSwatchHighlight();
      setFormMode('edit');
      inputName.focus();
      inputName.select();
      renderList();
    }

    function cancelEdit() {
      inputName.value = '';
      inputColor.value = '#90caf9';
      inputHex.value = '#90caf9';
      updateSwatchHighlight();
      setFormMode('add');
      renderList();
    }

    // ── 초기화 ──────────────────────────
    ipcRenderer.on('init-categories', (_e, data) => {
      categories = data || [];
      renderList();
    });

    // ── 추가 ────────────────────────────
    btnAdd.addEventListener('click', addCategory);
    inputName.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (editingIdx >= 0) applyEdit();
        else addCategory();
      }
    });

    function addCategory() {
      const name = inputName.value.trim();
      if (!name) return;
      if (categories.some(c => c.name === name)) {
        inputName.select();
        return;
      }
      categories.push({ name, color: inputColor.value });
      inputName.value = '';
      inputName.focus();
      renderList();
    }

    // ── 편집 적용 ───────────────────────
    btnUpdate.addEventListener('click', applyEdit);
    btnEditCancel.addEventListener('click', cancelEdit);

    function applyEdit() {
      if (editingIdx < 0) return;
      const cat = categories[editingIdx];
      const newName = inputName.value.trim();
      if (newName && (newName === cat.name || !categories.some(c => c.name === newName))) {
        cat.name = newName;
      }
      cat.color = inputColor.value;
      cancelEdit();
    }

    // ── Utility ─────────────────────────
    function contrastText(hex) {
      const c = hex.replace('#', '');
      const r = parseInt(c.substr(0, 2), 16);
      const g = parseInt(c.substr(2, 2), 16);
      const b = parseInt(c.substr(4, 2), 16);
      const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      return lum > 0.55 ? '#222' : '#fff';
    }

    // ── 렌더링 ──────────────────────────
    function renderList() {
      catList.innerHTML = '';
      if (categories.length === 0) {
        catList.innerHTML = `<div class="empty-msg">${t('category.noCategories')}</div>`;
        return;
      }

      // 그룹별 분류 (원본 인덱스 보존)
      const grouped = {};   // { groupName: [{ cat, idx }, ...] }
      const ungrouped = []; // ':' 없는 태그
      categories.forEach((cat, idx) => {
        const colonIdx = cat.name.indexOf(':');
        if (colonIdx > 0) {
          const group = cat.name.substring(0, colonIdx);
          if (!grouped[group]) grouped[group] = [];
          grouped[group].push({ cat, idx });
        } else {
          ungrouped.push({ cat, idx });
        }
      });

      // 그룹 없는 태그 먼저
      ungrouped.forEach(item => {
        catList.appendChild(makeCatItem(item.cat, item.idx, false));
      });

      // 그룹별 렌더링
      Object.keys(grouped).forEach(group => {
        const header = document.createElement('div');
        header.className = 'cat-group-header';
        header.textContent = group;
        catList.appendChild(header);

        grouped[group].forEach(item => {
          catList.appendChild(makeCatItem(item.cat, item.idx, true));
        });
      });
    }

    function makeCatItem(cat, idx, isGrouped) {
      const div = document.createElement('div');
      div.className = 'cat-item' + (isGrouped ? ' grouped' : '');
      if (editingIdx === idx) div.classList.add('active-edit');

      const txtColor = contrastText(cat.color);
      const colonIdx = cat.name.indexOf(':');
      const displayName = colonIdx > 0 ? cat.name.substring(colonIdx + 1) : cat.name;

      div.innerHTML =
        `<span class="cat-badge" style="background:${cat.color};color:${txtColor};">${displayName}</span>` +
        `<span class="cat-name"></span>` +
        `<button class="btn-edit">${t('category.edit')}</button>` +
        `<button class="btn-del">${t('category.delete')}</button>`;

      div.querySelector('.btn-edit').addEventListener('click', e => {
        e.stopPropagation();
        startEdit(idx);
      });

      div.querySelector('.btn-del').addEventListener('click', e => {
        e.stopPropagation();
        if (editingIdx === idx) cancelEdit();
        else if (editingIdx > idx) editingIdx--;
        categories.splice(idx, 1);
        renderList();
      });

      div.addEventListener('dblclick', () => startEdit(idx));

      return div;
    }

    // ── 저장 / 취소 ────────────────────
    document.getElementById('btnSave').addEventListener('click', () => {
      ipcRenderer.send('category-settings-save', categories);
    });
    document.getElementById('btnCancel').addEventListener('click', () => {
      ipcRenderer.send('category-settings-cancel');
    });

    // 단축키
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        if (editingIdx >= 0) {
          cancelEdit();
        } else {
          ipcRenderer.send('category-settings-cancel');
        }
      }
    });
  </script>
</body>
</html>
