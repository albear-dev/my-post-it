<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Password</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: '맑은 고딕', Malgun Gothic, sans-serif;
      font-size: 9pt;
      background: #f5f5f5;
      padding: 16px 20px;
      user-select: none;
    }
    .prompt {
      margin-bottom: 10px;
      font-weight: bold;
      color: #444;
    }
    input[type="password"] {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #bbb;
      border-radius: 4px;
      font-family: inherit;
      font-size: 9pt;
      margin-bottom: 8px;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: #5c9eff;
      box-shadow: 0 0 3px rgba(92,158,255,0.4);
    }
    .error {
      color: #c00;
      font-size: 8.5pt;
      margin-bottom: 8px;
      min-height: 14px;
    }
    .buttons {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 12px;
    }
    .buttons button {
      padding: 6px 18px;
      border: 1px solid #bbb;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 9pt;
    }
    .buttons button:hover { background: #eee; }
    #btnOk {
      background: #4a8df8;
      color: #fff;
      border-color: #4a8df8;
    }
    #btnOk:hover { background: #3a7de8; }
    #confirmRow { display: none; }
  </style>
</head>
<body>
  <div class="prompt" id="promptText"></div>
  <input type="password" id="inputPassword" autocomplete="off">
  <div id="confirmRow">
    <div class="prompt" id="confirmLabel"></div>
    <input type="password" id="inputConfirm" autocomplete="off">
  </div>
  <div class="error" id="errorText"></div>
  <div class="buttons">
    <button id="btnCancel" data-i18n="dialog.passwordCancel">취소</button>
    <button id="btnOk" data-i18n="dialog.passwordOk">확인</button>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    let _translations = {};
    function t(key) { return _translations[key] || key; }
    function applyTranslations() {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = t(el.dataset.i18n);
      });
    }
    ipcRenderer.on('set-translations', (_e, tr) => {
      _translations = tr;
      applyTranslations();
    });

    let mode = 'set';
    let storedPassword = '';

    ipcRenderer.on('init-password', (_e, data) => {
      mode = data.mode;
      storedPassword = data.storedPassword || '';
      if (mode === 'set') {
        document.getElementById('promptText').textContent = t('dialog.passwordSet');
        document.getElementById('confirmRow').style.display = 'block';
        document.getElementById('confirmLabel').textContent = t('dialog.passwordConfirm');
      } else {
        document.getElementById('promptText').textContent = t('dialog.passwordEnter');
        document.getElementById('confirmRow').style.display = 'none';
      }
      document.getElementById('inputPassword').focus();
    });

    document.getElementById('btnOk').addEventListener('click', submit);
    document.getElementById('btnCancel').addEventListener('click', () => {
      ipcRenderer.send('password-cancel');
    });

    function submit() {
      const pw = document.getElementById('inputPassword').value;
      const errorEl = document.getElementById('errorText');
      errorEl.textContent = '';

      if (!pw) return;

      if (mode === 'set') {
        const confirm = document.getElementById('inputConfirm').value;
        if (pw !== confirm) {
          errorEl.textContent = t('dialog.passwordMismatch');
          return;
        }
        ipcRenderer.send('password-submit', { password: btoa(unescape(encodeURIComponent(pw))) });
      } else {
        if (btoa(unescape(encodeURIComponent(pw))) !== storedPassword) {
          errorEl.textContent = t('dialog.passwordWrong');
          document.getElementById('inputPassword').value = '';
          document.getElementById('inputPassword').focus();
          return;
        }
        ipcRenderer.send('password-submit', { password: storedPassword });
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') ipcRenderer.send('password-cancel');
      if (e.key === 'Enter') submit();
    });
  </script>
</body>
</html>
